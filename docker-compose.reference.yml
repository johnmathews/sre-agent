# ============================================================================
# SRE Assistant — reference snippet for embedding into an existing Docker
# Compose stack.
#
# Copy the services below into your existing compose file and adjust paths,
# ports, and network names to match your setup.
#
# Prerequisites:
#   1. Build the image:  docker build -t sre-assistant /path/to/homelab-sre-assistant
#   2. Build the vector store (first time only):
#      docker run --rm -v sre_chroma:/app/.chroma_db \
#        --env-file /path/to/.env \
#        -e ANONYMIZED_TELEMETRY=False \
#        sre-assistant python -m scripts.ingest_runbooks
#   3. If using LLM_PROVIDER=anthropic:
#      - Install Claude Code on the Docker host: npm install -g @anthropic-ai/claude-code
#      - Authenticate: claude login  (or: claude setup-token for headless/SSH)
#      - This stores OAuth tokens in ~/.claude/ which is mounted into the container
#
# Required env vars (in your .env or environment block):
#   LLM_PROVIDER          — "openai" or "anthropic"
#   OPENAI_API_KEY        — required when LLM_PROVIDER=openai
#   ANTHROPIC_API_KEY     — set to any non-empty value when LLM_PROVIDER=anthropic
#                           (actual auth comes from mounted ~/.claude/ credentials)
#   ANTHROPIC_MODEL       — e.g. "claude-opus-4-6" (default)
#   PROMETHEUS_URL        — e.g. http://prometheus:9090
#   GRAFANA_URL           — e.g. http://grafana:3000
#   GRAFANA_SERVICE_ACCOUNT_TOKEN — Grafana service account token
#
# Optional env vars (leave empty to disable):
#   PROXMOX_URL, PROXMOX_API_TOKEN   — Proxmox VE tools
#   PBS_URL, PBS_API_TOKEN            — Proxmox Backup Server tools
#   TRUENAS_URL, TRUENAS_API_KEY      — TrueNAS SCALE tools
#   LOKI_URL                          — Loki log tools
#   MEMORY_DB_PATH                    — persistent memory store (SQLite)
#   SMTP_HOST, SMTP_USERNAME, ...     — email delivery of weekly reports
#
# See .env.example for the full list with descriptions.
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # SRE API — FastAPI backend on port 8001
  # --------------------------------------------------------------------------
  sre-api:
    image: sre-assistant                    # or: build: /path/to/homelab-sre-assistant
    container_name: sre-api
    ports:
      - "8001:8000"                         # host:container — adjust host port as needed
    env_file: /path/to/sre-assistant.env    # or inline environment: block
    environment:
      - ANONYMIZED_TELEMETRY=False
    restart: unless-stopped
    volumes:
      # Vector store — shared named volume, populated by the ingest step above
      - sre_chroma:/app/.chroma_db

      # Conversation history — persistent storage for chat sessions
      - /path/to/conversations:/app/conversations

      # Claude Agent SDK credentials — required for LLM_PROVIDER=anthropic.
      # Mount the directory where `claude login` stored OAuth tokens.
      # This is a no-op (empty dir) when using LLM_PROVIDER=openai.
      - ~/.claude:/root/.claude:ro

      # Memory store — if MEMORY_DB_PATH=/app/memory.db, persist the SQLite file
      # - /path/to/sre-memory.db:/app/memory.db
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # If your stack uses a custom network:
    # networks:
    #   - your-network

  # --------------------------------------------------------------------------
  # SRE UI — Streamlit frontend on port 8501
  # --------------------------------------------------------------------------
  sre-ui:
    image: sre-assistant                    # same image, different entrypoint
    container_name: sre-ui
    command: ["streamlit", "run", "src/ui/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    restart: unless-stopped
    environment:
      # Point to the API container. Use the container name or Docker DNS name.
      - API_URL=http://sre-api:8000
    depends_on:
      sre-api:
        condition: service_healthy
    # networks:
    #   - your-network

volumes:
  sre_chroma:

# networks:
#   your-network:
#     external: true
