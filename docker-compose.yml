# SRE Agent Docker Compose
#
# Standalone usage:
#   docker compose --profile setup run sre-ingest   # build vector store (first time)
#   docker compose up -d                             # start API + webapp
#
# Embedding into an existing stack:
#   Copy the sre-agent and sre-webapp services below into your compose file.
#   Replace `build: .` with `image: ghcr.io/johnmathews/sre-agent:latest`,
#   adjust ports, and add your network. The sre-ingest step only needs to run
#   once to populate the chroma_data volume.
#
# For a ready-to-run demo using published images instead of `build: .`,
# see docker-compose.demo.yml.
#
# Prerequisites for LLM_PROVIDER=anthropic:
#   1. Install Claude Code on the Docker host: npm install -g @anthropic-ai/claude-code
#   2. Authenticate: claude login  (or: claude setup-token for headless/SSH)
#   3. Tokens are stored in ~/.claude/ and mounted read-write into the container
#      (read-write so the CLI can auto-refresh short-lived OAuth access tokens)
#
# Required env vars — see .env.example for the full list with descriptions.
#   LLM_PROVIDER, PROMETHEUS_URL, GRAFANA_URL, GRAFANA_SERVICE_ACCOUNT_TOKEN
#   Plus OPENAI_API_KEY (openai) or ANTHROPIC_API_KEY (anthropic, any non-empty value)

services:
  sre-ingest:
    build: .
    command: ["python", "-m", "scripts.ingest_runbooks"]
    env_file: .env
    environment:
      - ANONYMIZED_TELEMETRY=False
    volumes:
      - chroma_data:/app/.chroma_db
    profiles: ["setup"]

  sre-agent:
    build: . # or: image: ghcr.io/johnmathews/sre-agent:latest
    ports:
      - "${SRE_API_PORT:-8000}:8000"
    env_file: .env
    environment:
      - ANONYMIZED_TELEMETRY=False
      - CLAUDE_CONFIG_DIR=/app/.claude
      - HOME=/app
    restart: unless-stopped
    mem_limit: 768m # 1 uvicorn worker + up to ~5 concurrent SDK CLI subprocesses
    volumes:
      - chroma_data:/app/.chroma_db
      - ${CONVERSATION_HISTORY_HOST_DIR:-./conversations}:/app/conversations
      # Claude Agent SDK: OAuth credentials for LLM_PROVIDER=anthropic.
      # Read-write so the CLI can auto-refresh short-lived OAuth access tokens.
      # Harmless empty-dir mount when using LLM_PROVIDER=openai.
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/app/.claude
      # Uncomment to persist the memory store SQLite DB:
      # - ./sre-memory.db:/app/memory.db
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  sre-webapp:
    # Vue 3 SPA frontend — see johnmathews/sre-webapp
    image: ghcr.io/johnmathews/sre-webapp:latest
    ports:
      - "${SRE_WEBAPP_PORT:-8080}:80"
    restart: unless-stopped
    environment:
      # nginx proxies /api/* to this upstream (stripping the /api prefix)
      - API_UPSTREAM=http://sre-agent:8000
    mem_limit: 64m
    depends_on:
      sre-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  chroma_data:
