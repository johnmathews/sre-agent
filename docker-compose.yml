# Docker Compose for the SRE Assistant.
#
# Standalone usage:
#   docker compose --profile setup run sre-ingest   # build vector store (first time)
#   docker compose up -d                             # start API + UI
#
# To embed into an existing stack, copy the sre-api and sre-ui services into
# your compose file. See docker-compose.reference.yml for a copy-paste snippet
# with inline comments explaining every field.

services:
  sre-ingest:
    build: .
    command: ["python", "-m", "scripts.ingest_runbooks"]
    env_file: .env
    environment:
      - ANONYMIZED_TELEMETRY=False
    volumes:
      - chroma_data:/app/.chroma_db
    profiles: ["setup"]

  sre-api:
    build: .
    # Default CMD from Dockerfile (uvicorn)
    ports:
      - "${SRE_API_PORT:-8000}:8000"
    env_file: .env
    environment:
      - ANONYMIZED_TELEMETRY=False
    restart: unless-stopped
    volumes:
      - chroma_data:/app/.chroma_db
      - ${CONVERSATION_HISTORY_HOST_DIR:-./conversations}:/app/conversations
      # Claude Agent SDK: mount host credentials for OAuth token auth.
      # Required when LLM_PROVIDER=anthropic. The CLI subprocess reads
      # auth tokens from this directory. Read-only mount.
      # Harmless no-op when using LLM_PROVIDER=openai.
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/root/.claude:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  sre-ui:
    build: .
    command: ["streamlit", "run", "src/ui/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    restart: unless-stopped
    environment:
      - API_URL=http://sre-api:8000
    depends_on:
      sre-api:
        condition: service_healthy

volumes:
  chroma_data:
